const lerp=(a,b,t)=>a+(b-a)*t, ease=t=>t*t*(3-2*t), clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

/* ---------- audio ---------- */
let AC=null;
function audio(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}}
function tone(f,d,type='square',vol=.05,slide=0){
  if(!AC)return;const o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.value=f;
  if(slide)o.frequency.linearRampToValueAtTime(Math.max(30,f+slide),AC.currentTime+d);
  g.gain.value=vol;g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d);
}
let NB=null;
function noise(d,vol,fc){if(!AC)return;
  if(!NB){NB=AC.createBuffer(1,AC.sampleRate*.5,AC.sampleRate);
    const a=NB.getChannelData(0);for(let i=0;i<a.length;i++)a[i]=Math.random()*2-1;}
  const src=AC.createBufferSource();src.buffer=NB;src.loop=true;
  const f=AC.createBiquadFilter();f.type='bandpass';f.frequency.value=fc||800;f.Q.value=.85;
  const g=AC.createGain();g.gain.value=vol;g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);
  src.connect(f);f.connect(g);g.connect(AC.destination);src.start();src.stop(AC.currentTime+d);
}

  dash:()=>tone(240,.07,'triangle',.04,180),
  super:()=>{tone(200,.5,'sawtooth',.07,600);tone(400,.5,'square',.04,900);}};

function playMusic(st){
  if(music.cur===st&&music.int)return;
  stopMusic();const M=MUSIC[st];if(!M)return;music.cur=st;
  const stepMs=60000/M.bpm/2;let i=0;
  music.int=setInterval(()=>{if(!AC)return;
    const b=M.bass[i%8],l=M.lead[i%8];
    if(b)tone(b,stepMs/1000*.95,'triangle',.05);
    if(l)tone(l,stepMs/1000*.55,M.type,.02);
    if(i%4===2)noise(.04,.045,1600);
    if(i%8===0)tone(52,.12,'sine',.09);
    if(st==='arena'&&i%16===8)noise(.7,.035,420);
    i++;},stepMs);
}
function stopMusic(){if(music.int){clearInterval(music.int);music.int=null;}music.cur=null;}

function buildTouch(){

    const off=e=>{e.preventDefault();for(const k of b.k)keys[k]=false;};
    el.addEventListener('pointerdown',on);el.addEventListener('pointerup',off);
    el.addEventListener('pointercancel',off);el.addEventListener('pointerleave',off);
    ui.appendChild(el);
  }
}

function poseLerp(a,b,t){const o={};for(const k of PK)o[k]=lerp(a[k],b[k],t);return o;}
function track(list,t){
  if(t<=list[0][0])return list[0][1];
  for(let i=0;i<list.length-1;i++){const[t0,p0]=list[i],[t1,p1]=list[i+1];
    if(t>=t0&&t<=t1){const u=t1>t0?(t-t0)/(t1-t0):1;return poseLerp(p0,p1,ease(u));}}
  return list[list.length-1][1];
}

function setStage(k){
  for(const s in stages)stages[s].visible=(s===k);
  const G=stages[k];scene.fog=G.fog;scene.background=new THREE.Color(G.sky);
  if(G.rimc)rim.color.setHex(G.rimc);
}
function tickStage(t){
  const b=stages.ufo;if(b&&b.visible&&b.ufo){b.ufo.rotation.y=t*.012;b.ufo.position.y=8.5+Math.sin(t*.02)*.5;}
  const c=stages.court;if(c&&c.visible&&c.scaleObj)c.scaleObj.rotation.z=Math.sin(t*.02)*.12;
  const a=stages.arena;if(a&&a.visible){
    if(a.crowd)for(const m of a.crowd)m.position.y=Math.floor(m.position.y/1.6)*1.6+2+Math.abs(Math.sin(t*.09+m.userData.ph))*.35;
    if(a.screen)a.screen.material.color.setHSL((t*.0022)%1,.6,.62);
  }
  const L=stages.lab;if(L&&L.visible&&L.pots)L.pots.forEach((p,i)=>p.scale.setScalar(1+Math.sin(t*.09+i*1.7)*.16));
  const CN=stages.cinema;if(CN&&CN.visible&&CN.scr)CN.scr.material.color.setHSL(.62,.14,.5+Math.sin(t*.13)*.1+Math.sin(t*.041)*.06);
  const OF=stages.office;if(OF&&OF.visible&&OF.mons)OF.mons.forEach((m,i)=>{if((Math.floor(t*.02)+i)%9===0)m.material.color.setHex(0x1d2b22);else m.material.color.setHex(0x39ff6e);});
  const GY=stages.gym;if(GY&&GY.visible){
    if(GY.cells)GY.cells.forEach((c,i)=>{const ph=(t*.03+i*.9)%6.28;c.material.color.setHSL(.36,.9,.5+Math.sin(ph)*.28);});
    if(GY.charge)GY.charge.material.color.setHSL(.42,.8,.28+Math.abs(Math.sin(t*.05))*.22);
    if(GY.osc)GY.osc.material.color.setHSL(.56,.7,.18+Math.abs(Math.sin(t*.09))*.14);
  }
}

/* ===========================================================
   LUCHADOR
   =========================================================== */
class Fighter{
  constructor(cid,x,facing,ctrl,alt){
    this.c=CHARS[cid];this.d=this.c.d;this.name=this.c.name;
    this.M=this.c.moves();this.ctrl=ctrl;this.wins=0;
    this.rig=new Rig(this.c);scene.add(this.rig.root);
    this.blob=new THREE.Mesh(new THREE.CircleGeometry(.62,24),
      new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.26,depthWrite:false}));
    this.blob.rotation.x=-Math.PI/2;this.blob.position.y=.025;scene.add(this.blob);
    this.hud=this.c.pal.hud;
    if(alt){this.applyAlt();this.hud=this.c.pal.altHud||this.hud;}
    this.reset(x,facing);
  }
  applyAlt(){
    const map=this.c.pal.altMap||{};
    for(const m of this.rig.M){
      const nx=map[m.color.getHex()];
      if(nx!==undefined)m.color.setHex(nx);
    }
  }
  reset(x,facing){
    this.x=x;this.y=GROUND;this.vx=0;this.vy=0;this.facing=facing;
    this.hp=this.c.hpMax;this.meter=0;this.t=0;
    this.state='idle';this.mv=null;this.mvT=0;this.hitIds=new Set();this.flashT=0;
    this.stun=0;this.blocking=false;this.crouch=false;this.walkPh=0;
    this.dashT=0;this.dashDir=0;this.tapT=0;this.tapDir=0;this.cd=0;
    this.aiT=0;this.plan='none';this.planT=0;this.pose=IDLE;
    this.sync();
  }
  get air(){return this.y<GROUND-.5;}
  read(){
    const c=this.ctrl;if(!c)return this.ai();
    return{left:!!keys[c.left],right:!!keys[c.right],up:!!keys[c.up],down:!!keys[c.down],
      punch:!!just[c.punch],kick:!!just[c.kick],spec:!!just[c.spec],sup:!!just[c.sup],
      tapL:!!just[c.left],tapR:!!just[c.right]};
  }
  ai(){
    const o=this.opp,A=this.c.ai,lvl=game.aiLevel||1;
    const i={left:0,right:0,up:0,down:0,punch:0,kick:0,spec:0,sup:0,tapL:0,tapR:0};
    if(game.mode!=='fight')return i;
    const dx=o.x-this.x,ad=Math.abs(dx),toward=dx>0?'right':'left',away=dx>0?'left':'right';
    if((o.mv&&ad<150&&Math.random()<.36*lvl)||ents.some(e=>e.owner!==this&&(e.kind==='orb'||e.kind==='paper')&&Math.abs(e.x-this.x)<160)){
      i[away]=1;
      if(o.mv&&o.mv.guard==='low'&&Math.random()<.6)i.down=1;
      if(Math.random()<A.jumpy*.5&&!this.air&&ents.some(e=>e.owner!==this&&Math.abs(e.x-this.x)<130))i.up=1;
      return i;
    }
    if(this.meter>=100&&ad<170&&Math.random()<.06*lvl){i.sup=1;return i;}
    if(--this.aiT<=0){
      const r=Math.random();
      if(ad>250){
        if(r<A.fire)i.spec=1;
        else if(r<A.fire+A.jumpy){this.plan='jumpin';this.planT=34;}
        else{this.plan='approach';this.planT=30;}
      }else if(ad>120){
        if(r<A.aggr){this.plan='approach';this.planT=16;}
        else if(r<A.aggr+.18)i.kick=1;
        else if(r<A.aggr+.28)i.spec=1;
        else{this.plan='retreat';this.planT=16;}
      }else{
        if(r<.34)i.punch=1;else if(r<.58)i.kick=1;
        else if(r<.72){i.kick=1;i.down=1;}
        else if(r<.82)i.spec=1;
        else{this.plan='retreat';this.planT=18;}
      }
      this.aiT=Math.max(6,(22-lvl*4)+Math.random()*22);
    }
    if(this.planT>0){
      this.planT--;
      if(this.plan==='approach')i[toward]=1;
      if(this.plan==='retreat')i[away]=1;
      if(this.plan==='jumpin'){i[toward]=1;if(!this.air)i.up=1;
        if(this.air&&ad<110&&Math.random()<.3)i.kick=1;}
    }
    return i;
  }
  pick(i){
    if(this.mv||this.stun>0)return;const M=this.M;
    if(i.sup&&this.meter>=100&&!this.air){this.meter=0;this.start(M.super);return;}
    if(i.spec&&this.cd<=0&&!this.air){this.cd=42;this.start(M.special);return;}
    if(this.air){if(i.punch)this.start(M.jpunch);else if(i.kick)this.start(M.jkick);return;}
    if(this.crouch){if(i.punch)this.start(M.cpunch);else if(i.kick)this.start(M.sweep);return;}
    if(i.punch)this.start(M.punch);else if(i.kick)this.start(M.kick);
  }
  start(mv){
    this.mv=mv;this.mvT=0;this.hitIds=new Set();this.state='attack';
    if(mv===this.M.super)game.tilt=.06*this.facing;
    if(mv.name){game.moveName=mv.name;game.moveNameT=64;game.moveOwner=this;}else sfx.swing();
  }
  update(){
    this.t++;if(this.cd>0)this.cd--;if(this.tapT>0)this.tapT--;
    if(this.state==='ko'){this.vy+=GRAV;this.y=Math.min(GROUND,this.y+this.vy);
      this.x+=this.vx;this.vx*=.9;this.clamp();this.sync();return;}
    if(this.state==='win'){this.sync();return;}
    if(this.stun>0){
      this.stun--;this.x+=this.vx;this.vx*=.85;this.vy+=GRAV;this.y+=this.vy;
      if(this.y>GROUND){this.y=GROUND;this.vy=0;}
      if(this.stun<=0)this.state='idle';
      this.clamp();this.sync();return;
    }
    if(!this.air&&!this.mv)this.facing=this.opp.x>=this.x?1:-1;
    const i=(game.mode==='fight')?this.read():{left:0,right:0,up:0,down:0,punch:0,kick:0,spec:0,sup:0,tapL:0,tapR:0};
    if(this.mv){
      const m=this.mv;this.mvT++;
      if(m.onFrame&&m.onFrame[this.mvT])m.onFrame[this.mvT](this);
      if(m.vx)this.x+=m.vx(this.mvT)*this.facing;
      if(m.vy){const v=m.vy(this.mvT);if(v)this.vy=v;}
      this.vy+=GRAV;this.y+=this.vy;
      if(this.y>GROUND){this.y=GROUND;this.vy=0;}
      const tot=m.startup+m.active+m.recover;
      if(this.mvT>=tot||(m.air&&!this.air&&this.mvT>m.startup+2)){this.mv=null;this.state='idle';}
      this.clamp();this.sync();return;
    }
    if(i.tapL||i.tapR){
      const dir=i.tapR?1:-1;
      if(this.tapT>0&&this.tapDir===dir&&!this.air){this.dashT=13;this.dashDir=dir;sfx.dash();
        const c=this.rig.joint('chest');burst(new THREE.Vector3(c.x-this.facing*.25,c.y-.3,c.z),3,this.c.pal.accent,.03);}
      this.tapT=13;this.tapDir=dir;
    }
    if(this.dashT>0&&!this.air){
      this.dashT--;this.x+=this.dashDir*8.4*(this.dashT/13+.35);
      this.state='dash';this.clamp();this.pick(i);this.sync();return;
    }
    this.crouch=!!i.down&&!this.air;this.blocking=false;
    let mvx=0;
    if(!this.crouch){if(i.left)mvx-=1;if(i.right)mvx+=1;}
    const threat=(this.opp.mv&&Math.abs(this.opp.x-this.x)<170)||ents.some(e=>e.owner!==this&&Math.abs(e.x-this.x)<130);
    const back=-this.facing;
    if(!this.air&&threat&&(mvx===back||(i.down&&(i.left||i.right)&&(i.right?1:-1)===back))){this.blocking=true;mvx=0;}
    this.x+=mvx*this.c.speed;
    if(mvx!==0&&!this.air)this.walkPh+=.22*(mvx===this.facing?1:-.85);
    if(i.up&&!this.air){this.vy=this.c.jump;sfx.jump();if(mvx!==0)this.vx=mvx*3.6;}
    this.x+=this.vx;if(!this.air)this.vx*=.7;
    this.vy+=GRAV;this.y+=this.vy;
    if(this.y>GROUND){this.y=GROUND;this.vy=0;this.vx=0;}
    if(this.air)this.state='airborne';
    else if(this.blocking)this.state=this.crouch?'blockLow':'block';
    else if(this.crouch)this.state='crouch';
    else if(mvx!==0)this.state='walk';
    else this.state='idle';
    if(!this.blocking)this.pick(i);
    this.clamp();this.sync();
  }
  clamp(){this.x=clamp(this.x,36,W-36);}
  currentPose(){
    if(this.state==='ko')return (game.winner&&game.winner!==this&&(game.mode==='matchend'||game.mode==='fatalwait'))?POSE.defeat:POSE.ko;
    if(this.state==='win')return POSE.win;
    if(this.stun>0)return POSE.hurt;
    if(this.mv)return track(this.mv.tr,this.mvT);
    if(this.state==='dash')return POSE.dash;
    if(this.state==='block')return POSE.block;
    if(this.state==='blockLow')return POSE.blockLow;
    if(this.state==='crouch')return POSE.crouch;
    if(this.air)return this.vy<0?POSE.jump:POSE.fall;
    if(this.state==='walk'){
      const s=Math.sin(this.walkPh),ab=Math.abs(s);
      return P({py:-92+ab*3,torso:8,head:2,armUF:152-s*10,armLF:78-s*12,armUB:196+s*12,armLB:158+s*10,
        legUF:180+s*22,legLF:180+s*22+Math.max(0,s)*26,legUB:180-s*22,legLB:180-s*22+Math.max(0,-s)*26});
    }
    const b=Math.sin(this.t*.06);
    return P({py:-92+b*1.6,torso:6+b*1.2,head:2-b,armLF:78+b*4,armLB:158-b*3,armUF:152+b*2});
  }
  plantMode(){
    if(this.state==='ko'||this.air)return 'none';
    if(this.mv)return this.mv.plant||'both';
    return 'both';
  }
  sync(){
    this.pose=this.currentPose();
    this.rig.root.position.x=(this.x-480)*K;
    this.rig.apply(this.pose,this.facing,(GROUND-this.y)*K,this.plantMode());
    if(this.flashT>0){this.flashT--;
      for(const m of this.rig.M)if(m.emissive)m.emissive.setHex(this.flashT>0?0x9a9a9a:0x000000);}
    if(this.blob){this.blob.position.x=(this.x-480)*K;
      const hg=(GROUND-this.y)*K,sc=Math.max(.35,1-hg*.22);
      this.blob.scale.setScalar(sc);this.blob.material.opacity=.26*sc;}
    this.rig.tick(this.t);
  }
  jointPx(n){return w2px(this.rig.joint(n));}
  hitSphere(){
    const m=this.mv;if(!m||!m.limb)return null;
    if(this.mvT<m.startup||this.mvT>=m.startup+m.active)return null;
    return{p:this.rig.joint(m.limb),r:m.r*K*this.d.scale/Math.cos(YAW),
      dmg:Math.round(m.dmg*this.c.dmgMul),guard:m.guard,push:m.push,hitstun:m.hitstun,knockdown:m.knockdown};
  }
  hurtSpheres(){
    const d=this.d,s=K*d.scale,R=this.rig;
    return[{p:R.joint('headC'),r:d.headR*s*1.05},
           {p:R.joint('chest'),r:d.torsoW*.44*s},
           {p:R.joint('pel'),r:d.torsoW*.42*s},
           {p:R.joint('kneF'),r:d.limbW*1.6*s},
           {p:R.joint('kneB'),r:d.limbW*1.6*s}];
  }
  hitBy(src){
    if(this.state==='ko')return;
    const guard=src.guard||'mid';let blocked=false;
    if(this.blocking&&!this.air){
      if(guard==='mid')blocked=true;
      else if(guard==='low'&&this.crouch)blocked=true;
      else if(guard==='high'&&!this.crouch)blocked=true;
    }
    const dir=src.dir||1, chest=this.rig.joint('chest');
    if(blocked){
      this.hp-=Math.max(1,Math.round(src.dmg*.12));
      this.vx=dir*src.push*.5/this.c.weight;this.stun=Math.max(this.stun,8);
      this.meter=Math.min(100,this.meter+4);sfx.block();
      burst(chest,6,0x8ef0ff,.06);
    }else{
      this.hp-=src.dmg;this.state='hurt';
      this.vx=dir*src.push/this.c.weight;
      if(src.knockdown||this.air)this.vy=-7.5;
      this.stun=Math.max(this.stun,src.hitstun||14);
      this.meter=Math.min(100,this.meter+6);
      game.shake=Math.min(.16,.05+src.dmg*.007);
      game.freeze=Math.min(9,2+Math.round(src.dmg*.4));this.flashT=4;
      burst(chest,src.dmg>=14?14:8,src.dmg>=14?0xffffff:0xffd75a,src.dmg>=14?.11:.08);
      (src.dmg>=12?sfx.heavy:sfx.hit)();
    }
    if(this.hp<=0){this.hp=0;this.state='ko';this.mv=null;this.vx=dir*4.5;this.vy=-9;
      sfx.ko();game.shake=.22;}
  }
  kill(){scene.remove(this.rig.root);this.rig.dispose();if(this.blob){scene.remove(this.blob);this.blob.material.dispose();}}
}

let ents=[];
const sparks=[];
const sparkGeo=new THREE.OctahedronGeometry(.075,0);
const ringGeo=new THREE.TorusGeometry(.16,.028,8,24);
function burst(pos,n,color,spd,ring=true){
  for(let i=0;i<n;i++){
    const m=new THREE.Mesh(sparkGeo,new THREE.MeshBasicMaterial({color}));
    m.position.copy(pos);
    const a=Math.random()*6.28,b=(Math.random()-.5)*1.4;
    m.userData.v=new THREE.Vector3(Math.cos(a)*spd,Math.sin(a)*spd+.03,b*spd);
    m.userData.t=0;scene.add(m);sparks.push(m);
  }
  if(!ring)return;
  const rg=new THREE.Mesh(ringGeo,new THREE.MeshBasicMaterial({color,transparent:true,opacity:.85}));
  rg.position.copy(pos);rg.userData.v=new THREE.Vector3();rg.userData.t=0;rg.userData.ring=true;
  scene.add(rg);sparks.push(rg);
}
function tickSparks(){
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];
    if(s.userData.ring){
      s.userData.t++;s.scale.setScalar(1+s.userData.t*.6);
      s.material.opacity=Math.max(0,.85*(1-s.userData.t/9));
      if(s.userData.t>9){scene.remove(s);s.material.dispose();sparks.splice(i,1);}
      continue;
    }
    s.position.add(s.userData.v);
    s.userData.v.y-=.006;s.userData.t++;
    s.scale.setScalar(Math.max(.01,1-s.userData.t/16));
    s.rotation.x+=.3;s.rotation.y+=.2;
    if(s.userData.t>16){scene.remove(s);s.material.dispose();sparks.splice(i,1);}
  }
}
function makeEntMesh(e){
  const g=new THREE.Group();
  if(e.kind==='orb'){
    const col=e.owner.c.pal.accent;
    g.add(new THREE.Mesh(new THREE.SphereGeometry(e.r*K,12,10),new THREE.MeshBasicMaterial({color:col})));
    const h=new THREE.Mesh(new THREE.SphereGeometry(e.r*K*1.7,10,8),
      new THREE.MeshBasicMaterial({color:e.owner.c.pal.glow,transparent:true,opacity:.32}));
    g.add(h);const li=new THREE.PointLight(col,.8,4);g.add(li);
  }else if(e.kind==='paper'){
    g.add(new THREE.Mesh(new THREE.BoxGeometry(.32,.42,.02),mat(0xf4f1e4)));
    const st=new THREE.Mesh(new THREE.CylinderGeometry(.05,.05,.02,8),mat(0xc8262b));
    st.rotation.x=Math.PI/2;st.position.set(.08,-.12,.02);g.add(st);
  }else if(e.kind==='pole'){
    const c=new THREE.Mesh(new THREE.CylinderGeometry(.19,.22,2.6,8),mat(0x5aa03c));c.castShadow=true;g.add(c);
    for(let k=0;k<3;k++){const lf=new THREE.Mesh(new THREE.ConeGeometry(.34,1,4),mat(0x7fc24a));
      lf.position.set((k-1)*.35,.5+k*.4,0);lf.rotation.z=(k-1)*.7;g.add(lf);}
  }else if(e.kind==='beam'){
    const m=new THREE.Mesh(new THREE.CylinderGeometry(.75,1.4,14,16,1,true),
      new THREE.MeshBasicMaterial({color:0xd8feff,transparent:true,opacity:.55,side:THREE.DoubleSide}));
    m.position.y=7;g.add(m);
    const li=new THREE.PointLight(0x8ef0ff,2.2,10);li.position.y=2;g.add(li);
  }else if(e.kind==='gavel'){
    const hd=new THREE.Mesh(new THREE.CylinderGeometry(.55,.55,2,12),mat(0x5b3a1e));
    hd.rotation.z=Math.PI/2;hd.castShadow=true;g.add(hd);
    const bands=new THREE.Mesh(new THREE.CylinderGeometry(.58,.58,.3,12),mat(0xffd75a));
    bands.rotation.z=Math.PI/2;bands.position.x=.6;g.add(bands);
    const hn=new THREE.Mesh(new THREE.CylinderGeometry(.16,.16,2.6,8),mat(0x7d4a22));
    hn.position.y=1.4;hn.castShadow=true;g.add(hn);
    g.scale.setScalar(1.6);
  }
  scene.add(g);e.mesh=g;return g;
}
function killEnt(e){
  if(!e.mesh)return;scene.remove(e.mesh);
  e.mesh.traverse(o=>{if(o.geometry)o.geometry.dispose();if(o.material&&o.material.dispose)o.material.dispose();});
}
/* el combate vive en el plano XY: la profundidad se ignora, así el giro
   de postura es puramente estético y no descuadra los golpes */
function sphHit(a,b){const dx=a.p.x-b.p.x,dy=a.p.y-b.p.y,r=a.r+b.r;return dx*dx+dy*dy<r*r;}

function updateEnts(){
  for(const e of ents){
    e.t++;const tgt=e.owner===p1?p2:p1;
    if(!e.mesh)makeEntMesh(e);
    if(e.kind==='orb'||e.kind==='paper'){
      e.x+=e.vx;e.y+=e.vy||0;
      if(e.kind==='paper')e.y+=Math.sin(e.t*.3)*.6;
      const s={p:px2w(e.x,e.y),r:e.r*K};
      if(tgt.hurtSpheres().some(h=>sphHit(s,h))){
        tgt.hitBy({dmg:e.dmg,guard:e.guard,push:e.push,hitstun:e.hitstun,dir:Math.sign(e.vx)||1});
        e.dead=true;e.owner.meter=Math.min(100,e.owner.meter+5);
        burst(s.p,8,e.owner.c.pal.glow,.07);
      }
      if(e.x<-60||e.x>W+60||e.t>e.life)e.dead=true;
      e.mesh.position.copy(px2w(e.x,e.y));
      if(e.kind==='paper')e.mesh.rotation.z=e.t*.35;
      else e.mesh.rotation.y=e.t*.2;
      if(e.t%3===0)burst(e.mesh.position,1,e.owner.c.pal.glow,.012,false);
    }else if(e.kind==='pole'){
      e.y+=e.vy;
      const s={p:px2w(e.x,e.y),r:e.r*K*1.4};
      if(!e.hits.has(1)&&tgt.hurtSpheres().some(h=>sphHit(s,h))){
        e.hits.add(1);tgt.hitBy({dmg:e.dmg,guard:e.guard,push:e.push,hitstun:e.hitstun,dir:e.x<tgt.x?1:-1});
      }
      if(e.y>GROUND+140)e.dead=true;
      e.mesh.position.copy(px2w(e.x,e.y));e.mesh.rotation.y=e.t*.05;
    }else if(e.kind==='beam'){
      const p=px2w(e.x,GROUND);
      const s={p:new THREE.Vector3(p.x,1.2,0),r:.9};
      if(e.t>4&&!e.hits.has(1)&&tgt.hurtSpheres().some(h=>sphHit(s,h))){
        e.hits.add(1);tgt.hitBy({dmg:e.dmg,guard:e.guard,push:e.push,hitstun:e.hitstun,knockdown:true,
          dir:tgt.x>=e.x?1:-1});
        burst(new THREE.Vector3(p.x,1.4,0),16,0x8ef0ff,.1);
      }
      e.mesh.position.set(p.x,0,0);
      const k=clamp(e.t/6,0,1)*(e.t>34?clamp((44-e.t)/10,0,1):1);
      e.mesh.scale.set(k,1,k);e.mesh.rotation.y=e.t*.15;
      if(e.t>e.life)e.dead=true;
    }else if(e.kind==='gavel'){
      e.vy+=1.1;e.y+=e.vy;
      const s={p:px2w(e.x,e.y),r:e.r*K*.7};
      if(!e.hits.has(1)&&tgt.hurtSpheres().some(h=>sphHit(s,h))){
        e.hits.add(1);tgt.hitBy({dmg:e.dmg,guard:e.guard,push:e.push,hitstun:e.hitstun,knockdown:true,
          dir:tgt.x>=e.x?1:-1});
      }
      e.mesh.position.copy(px2w(e.x,e.y));
      e.mesh.rotation.z=Math.sin(e.t*.2)*.12;
      if(e.y>GROUND-20){e.dead=true;game.shake=.2;sfx.heavy();
        burst(px2w(e.x,GROUND-20),20,0xffd75a,.12);}
    }
  }
  for(let i=ents.length-1;i>=0;i--)if(ents[i].dead){killEnt(ents[i]);ents.splice(i,1);}
}

let showcase=null;
function buildShowcase(){
  showcase=new THREE.Group();

    const r=new Rig(CHARS[cid]);
    r.root.position.set((i-3.5)*2.55,0,0);

  });

function showcaseOn(on){
  if(showcase)showcase.visible=on;

}
function tickShowcase(t){
  if(!showcase||!showcase.visible)return;

  showcase.rigs.forEach((r,i)=>{
    const champW=game.tour?game.tour.player:(game.king?game.king.fighter:null);

    r.root.position.x=champ?0:(i-3.5)*2.55;
    r.root.position.z=champ?2:(sel?1.1:0);

function startMatch(c1,c2,twoP,stage,lvl){
  if(p1)p1.kill();if(p2)p2.kill();

  p2=new Fighter(c2,W*.7,-1,twoP?CTRL2:null,c1===c2);
  p1.opp=p2;p2.opp=p1;p1.wins=0;p2.wins=0;

function newRound(){
  p1.reset(W*.3,1);p2.reset(W*.7,-1);
  for(const e of ents)killEnt(e);ents=[];
  game.timer=99;game.tf=0;game.mode='intro';game.bt=0;game.banner='';game.moveNameT=0;game.fatality=false;game.fat=null;
  game.camX=0;game.camZ=11;
}
function simulate(a,b){
  const A=CHARS[a],B=CHARS[b];
  const wa=A.hpMax*.4+A.speed*8+A.dmgMul*30+Math.random()*60;
  const wb=B.hpMax*.4+B.speed*8+B.dmgMul*30+Math.random()*60;
  return wa>=wb?a:b;
}
function startTournament(pick){
  const o=ROSTER.filter(c=>c!==pick);
  for(let i=o.length-1;i>0;i--){const k=Math.floor(Math.random()*(i+1));[o[i],o[k]]=[o[k],o[i]];}
  game.tour={ent:[pick,o[0],o[1],o[2]],simW:null,semiW:null,finalW:null,stage:'semi',player:pick};
  game.mode='bracket';game.bt=0;
}
function startKing(pick){
  const q=ROSTER.filter(c=>c!==pick);
  for(let i=q.length-1;i>0;i--){const k=Math.floor(Math.random()*(i+1));[q[i],q[k]]=[q[k],q[i]];}
  game.king={fighter:pick,queue:q,idx:0,streak:0};
  const opp=q[0];startMatch(pick,opp,false,CHARS[opp].stage,1);
}
const FATLINE={panda:'«SIESTA ETERNA»',alien:'«ABDUCIDO»',lawyer:'«CASO CERRADO»',cheer:'«¡G-A-M-E O-V-E-R!»',
  carlos:'«SIN SEÑAL»',daniel:'«CERO ESTRELLAS»',antonio:'«CORTOCIRCUITO»',marta:'«SUJETO DE PRUEBAS»'};
function startFatality(){
  const W2=game.winner,L=game.fatLoser;
  W2.meter=0;
  game.fat={t:0,x:L.x,y:GROUND,vx:W2.facing*7,vy:-16,rot:0,launched:false,showF:false,rest:false};
  game.mode='fatality';game.fatality=true;game.stats.fat++;sfx.super();game.shake=6;
}
function tickFatality(){
  const F=game.fat,W2=game.winner,L=game.fatLoser;
  F.t++;
  const wp=F.t<22?POSE.charge:(F.t<48?POSE.release:POSE.idle);
  W2.rig.apply(wp,W2.facing,0,'both');
  if(F.t===22){
    F.launched=true;sfx.heavy();sfx.super();game.shake=10;game.hudFlash=6;
    const c=L.rig.joint('chest');burst(c,26,W2.c.pal.accent,.09);burst(c,10,W2.c.pal.glow,.05,false);
  }
  if(F.t>=22&&F.t<36){cam.fov=42+Math.sin((F.t-22)/14*Math.PI)*8;cam.updateProjectionMatrix();}
  else if(F.t===36){cam.fov=42;cam.updateProjectionMatrix();}
  if(F.launched&&!F.rest&&F.t%2===0)burst(L.rig.joint('pel'),2,W2.c.pal.glow,.018,false);
  if(F.launched&&!F.rest){
    F.x+=F.vx*.55;F.vy+=.28;F.y+=F.vy*.55;F.rot+=13;
    if(F.y>=GROUND){
      F.y=GROUND;
      if(!F.showF){F.showF=true;F.vy=-7;F.vx*=.45;game.shake=18;game.hudFlash=8;sfx.ko();
        tone(880,.55,'sawtooth',.1,-640);tone(620,.5,'square',.07,-480);noise(.5,.22,240);
        const c=L.rig.joint('pel');burst(c,30,W2.c.pal.glow,.11);burst(c,16,W2.c.pal.accent,.07,false);
        burst(c,20,0x9a948a,.07);burst(c,12,0x6e6a60,.05,false);
        const c2=c.clone();c2.y=.1;burst(c2,1,W2.c.pal.accent,.001);
      }else if(Math.abs(F.vy)<2.6){F.rest=true;game.shake=8;sfx.heavy();}
      else{F.vy*=-.4;F.vx*=.6;game.shake=8;sfx.heavy();}
    }
  }
  F.x=Math.max(60,Math.min(900,F.x));
  L.x=F.x;L.y=Math.max(0,Math.min(GROUND,F.y));
  if(!F.rest)L.rig.apply(Object.assign({},POSE.ball,{rot:F.rot}),L.facing,(GROUND-F.y)*K,'none');
  else L.rig.apply(POSE.fall,L.facing,0,'both');
  tickSparks();
  if(F.t>215){L.state='ko';L.y=GROUND;game.mode='matchend';game.bt=0;}
}
function kingNext(){
  const K=game.king,opp=K.queue[K.idx];
  startMatch(K.fighter,opp,false,CHARS[opp].stage,Math.min(3,1+Math.floor(K.idx/2)));
}
function bracketAdvance(){
  const T=game.tour;
  if(T.stage==='semi'){T.stage='semiFight';startMatch(T.player,T.ent[1],false,CHARS[T.ent[1]].stage,1);}
  else if(T.stage==='watch'){T.stage='watchFight';game.spectate=true;
    startMatch(T.ent[2],T.ent[3],false,CHARS[T.ent[3]].stage,2);p1.ctrl=null;}
  else if(T.stage==='final'){T.stage='finalFight';startMatch(T.player,T.simW,false,CHARS[T.simW].stage,2);}
}
function uiKey(k){
  const conf=(k==='j'||k==='enter'||k===' ');
  if(game.spectate&&conf&&(game.mode==='fight'||game.mode==='intro'||game.mode==='roundend')){
    sfx.sel();game.spectate=false;const T=game.tour;
    T.simW=simulate(T.ent[2],T.ent[3]);T.stage='final';
    game.mode='bracket';game.bt=0;showcaseOn(false);return;
  }
  if(game.mode==='title'){
    if(k==='w'||k==='arrowup'){game.sel=(game.sel+game.menu.length-1)%game.menu.length;sfx.sel();}
    if(k==='s'||k==='arrowdown'){game.sel=(game.sel+1)%game.menu.length;sfx.sel();}
    if(conf){sfx.sel();const M=game.menu[game.sel];
      game.tourMode=(M==='TORNEO');game.kingMode=(M==='REY DE MESA');game.mode2P=(M==='2 JUGADORES');
      game.tour=null;game.king=null;
      game.mode='select';game.confirmed=[false,false];game.p1c=0;game.p2c=1;}
  }else if(game.mode==='select'){
    if(k==='a'||k==='arrowleft'){game.p1c=(game.p1c+ROSTER.length-1)%ROSTER.length;sfx.sel();}
    if(k==='d'||k==='arrowright'){game.p1c=(game.p1c+1)%ROSTER.length;sfx.sel();}
    if(game.mode2P&&game.confirmed[0]&&(k===','||k==='.')){game.p2c=(game.p2c+(k==='.'?1:ROSTER.length-1))%ROSTER.length;sfx.sel();}
    if(conf){
      sfx.sel();const pick=ROSTER[game.p1c];
      if(game.tourMode)startTournament(pick);
      else if(game.kingMode)startKing(pick);
      else if(game.mode2P){
        if(!game.confirmed[0]){game.confirmed[0]=true;game.p2c=(game.p1c+1)%ROSTER.length;}
        else startMatch(pick,ROSTER[game.p2c],true,CHARS[ROSTER[game.p2c]].stage,1);
      }else{const opp=ROSTER[Math.floor(Math.random()*ROSTER.length)];startMatch(pick,opp,false,CHARS[opp].stage,1);}
    }
    if(k==='escape')game.mode='title';
  }else if(game.mode==='bracket'){ if(conf){sfx.sel();bracketAdvance();} }
  else if(game.mode==='fatalwait'){
    const sp=game.winner&&game.winner.ctrl?game.winner.ctrl.spec:null;
    if(sp&&k===sp)startFatality();
    else if(conf){sfx.sel();game.mode='matchend';game.bt=0;}
  }
  else if(game.mode==='matchend'){
    if(conf){
      sfx.sel();
      if(game.king){
        if(game.winner===p1){
          game.king.streak++;game.king.idx++;
          game.stats.best=Math.max(game.stats.best,game.king.streak);
          if(game.king.idx>=game.king.queue.length){game.kingChamp=true;game.mode='champion';game.bt=0;
            showcaseOn(true);makeConfetti();confetti.visible=true;}
          else kingNext();
        }else{game.king=null;game.mode='title';showcaseOn(true);}
        return;
      }
      const T=game.tour;
      if(T&&T.stage==='watchFight'){
        T.simW=game.winner.c.id;T.stage='final';game.spectate=false;
        game.mode='bracket';game.bt=0;showcaseOn(false);
      }else if(T&&game.winner===p1){
        if(T.stage==='semiFight'){T.semiW=T.player;T.stage='watch';
          game.mode='bracket';game.bt=0;showcaseOn(false);}
        else{T.finalW=T.player;game.mode='champion';game.bt=0;
          showcaseOn(true);makeConfetti();confetti.visible=true;}
      }else{game.tour=null;game.spectate=false;game.mode='title';showcaseOn(true);}
    }
  }else if(game.mode==='champion'){
    if(conf){sfx.sel();game.tour=null;game.king=null;game.kingChamp=false;game.mode='title';if(confetti)confetti.visible=false;}
  }
}

function update(){
  if(game.shake>0)game.shake*=.86;
  if(game.moveNameT>0)game.moveNameT--;
  if(game.mode==='title'||game.mode==='select'){showcaseOn(true);return;}
  if(game.mode==='bracket'){showcaseOn(false);return;}
  if(game.mode==='champion'){tickConfetti();return;}
  if(game.mode==='title'||game.mode==='select'||game.mode==='bracket'||game.mode==='champion')stopMusic();
  if(game.freeze>0){game.freeze--;return;}
  if(game.mode==='intro'){
    game.bt++;p1.sync();p2.sync();
    if(game.bt===1)game.banner='ROUND '+game.round;
    if(game.bt===66){game.banner='¡PELEA!';sfx.sel();}
    if(game.bt>=104){game.mode='fight';game.banner='';}
    return;
  }
  if(game.mode==='roundend'){
    game.bt++;p1.update();p2.update();updateEnts();tickSparks();
    if(game.bt>=140){
      if(p1.wins>=2||p2.wins>=2){game.winner=p1.wins>=2?p1:p2;game.winner.state='win';
        game.fatLoser=game.winner===p1?p2:p1;game.banner='';
        if(game.winner.ctrl&&!game.spectate)game.stats.wins++;
        if(game.winner.ctrl&&game.winner.meter>=100){game.mode='fatalwait';game.bt=0;}
        else{game.mode='matchend';game.bt=0;}}
      else{game.round++;newRound();}
    }
    return;
  }
  if(game.mode==='fatalwait'){game.bt++;p1.update();p2.update();tickSparks();
    if(game.bt%32===1){tone(56,.22,'sine',.13);setTimeout(()=>tone(44,.16,'sine',.09),150);}
    if(game.bt>130){game.mode='matchend';game.bt=0;}
    return;}
  if(game.mode==='fatality'){tickFatality();return;}
  if(game.mode==='matchend'){game.bt++;p1.update();p2.update();tickSparks();
    if(game.winner&&game.bt%22===0){
      const c=game.winner.rig.joint('chest');
      burst(new THREE.Vector3(c.x+(Math.random()-.5)*1.7,c.y+Math.random()*1.3,c.z+(Math.random()-.5)*.8),
        5,Math.random()<.5?0xffd75a:0xffffff,.05,false);
    }
    return;}
  if(game.mode!=='fight')return;

  game.tf++;if(game.tf>=60){game.tf=0;game.timer--;}
  p1.update();p2.update();
  const dx=p2.x-p1.x;
  if(Math.abs(dx)<44&&!p1.air&&!p2.air){
    const push=(44-Math.abs(dx))/2*(dx>=0?1:-1);
    p1.x-=push;p2.x+=push;p1.clamp();p2.clamp();p1.sync();p2.sync();
  }
  for(const[a,b]of[[p1,p2],[p2,p1]]){
    const hs=a.hitSphere();if(!hs)continue;
    const id=a.mv.multi?Math.floor(a.mvT/Math.max(2,Math.floor(a.mv.active/a.mv.multi))):0;
    if(a.hitIds.has(id))continue;
    if(b.hurtSpheres().some(h=>sphHit(hs,h))){
      a.hitIds.add(id);a.meter=Math.min(100,a.meter+(a.mv.multi?2:8));
      b.hitBy({dmg:hs.dmg,guard:hs.guard,push:hs.push,hitstun:hs.hitstun,knockdown:hs.knockdown,dir:a.facing});
    }
  }
  updateEnts();tickSparks();
  if(p1.state==='ko'||p2.state==='ko'||game.timer<=0){
    let msg;
    if(p1.state==='ko'&&p2.state==='ko')msg='DOBLE K.O.';
    else if(p1.state==='ko'){p2.wins++;msg='¡K.O.!  '+p2.name;}
    else if(p2.state==='ko'){p1.wins++;msg='¡K.O.!  '+p1.name;}
    else if(p1.hp>p2.hp){p1.wins++;msg='TIEMPO — '+p1.name;}
    else if(p2.hp>p1.hp){p2.wins++;msg='TIEMPO — '+p2.name;}
    else msg='TIEMPO — EMPATE';
    if((p1.state==='ko'&&p2.hp===p2.c.hpMax)||(p2.state==='ko'&&p1.hp===p1.c.hpMax))msg='¡PERFECTO!';
    game.banner=msg;game.mode='roundend';game.bt=0;game.freeze=8;
  }
}
/* --- cámara --- */
function tickCam(t){
  if(game.mode==='title'||game.mode==='select'){
    const tx=game.mode==='select'?(game.p1c-3.5)*2.55*.62:0;
    game.camX=lerp(game.camX,tx,.08);
    game.camZ=lerp(game.camZ,game.mode==='select'?9.5:11.5,.06);
    cam.position.set(game.camX+Math.sin(t*.006)*.6,2.6,game.camZ);
    cam.lookAt(game.camX,1.5,0);
    sun.target.position.set(0,1,0);return;
  }
  if(game.mode==='champion'){
    cam.position.set(Math.sin(t*.01)*3,2.8,7.5);cam.lookAt(0,1.6,1.5);return;
  }
  if(game.mode==='bracket'){cam.position.set(0,2.6,11.5);cam.lookAt(0,1.5,0);return;}
  if(game.mode==='fatality'&&game.fat){
    const F=game.fat,wx=clamp((F.x-480)*K,-7,7),wy=1.1+Math.max(0,(GROUND-F.y))*K*.85;
    const ang=F.t*.032;
    game.camX=lerp(game.camX,wx+Math.sin(ang)*5.2,.14);
    game.camZ=lerp(game.camZ,Math.cos(ang)*5.2,.14);
    game.camY=lerp(game.camY,wy+.7,.12);
    cam.position.set(game.camX,game.camY,game.camZ);
    cam.lookAt(wx,wy,0);
    sun.target.position.set(wx,1,0);
    return;
  }
  if(game.mode==='matchend'&&game.winner){
    const wx=clamp((game.winner.x-480)*K,-5.2,5.2);
    const e=ease(Math.min(1,game.bt/55));
    const ang=game.bt>60?Math.sin((game.bt-60)*.009)*.95:0;
    const Rr=lerp(10.5,4.6,e);
    game.camX=lerp(game.camX,wx+Math.sin(ang)*Rr,.08);
    game.camZ=lerp(game.camZ,Math.cos(ang)*Rr,.08);
    game.camY=lerp(game.camY,lerp(2.15,2.55,e),.08);
    cam.position.set(game.camX,game.camY,game.camZ);
    cam.lookAt(wx,lerp(1.35,2.25,e),0);
    sun.target.position.set(wx,1,0);
    return;
  }
  if(!p1||!p2)return;
  const x1=(p1.x-480)*K,x2=(p2.x-480)*K, mid=(x1+x2)/2, sep=Math.abs(x1-x2);
  const hi=Math.max((GROUND-p1.y)*K,(GROUND-p2.y)*K);
  const tz=clamp(7.4+sep*.62,7.6,13.5), ty=2.15+hi*.22;
  game.camX=lerp(game.camX,clamp(mid,-5.2,5.2),.09);
  game.camZ=lerp(game.camZ,tz,.06);
  game.camY=lerp(game.camY,ty,.07);
  const sh=game.shake;
  cam.position.set(game.camX+(Math.random()-.5)*sh*2,game.camY+(Math.random()-.5)*sh*2,game.camZ);
  cam.lookAt(game.camX,1.35+hi*.2,0);
  game.tilt=(game.tilt||0)*.88;if(Math.abs(game.tilt)>.002)cam.rotation.z+=game.tilt;
  cam.rotation.z+=(Math.random()-.5)*sh*.35;
  sun.target.position.set(game.camX,1,0);
}

  if(game.mode==='fatality'&&game.fat&&game.fat.showF){

    txt('F A T A L I T Y',W/2+j(),H/2-40+j(),56,'#ff2a1a');
    txt('F A T A L I T Y',W/2,H/2-40,54,'#ffd75a');
    txt(FATLINE[game.winner.c.id]||'',W/2,H/2+2,20,game.winner.hud);
  }
  if(game.mode==='matchend'&&game.winner){
    const bt=game.bt;
    if(game.fatality)txt('FATALITY',W/2,H-176,22,'#ff4a3a');
    const g=hx.createLinearGradient(0,H-230,0,H);
    g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(.35,'rgba(0,0,0,.55)');g.addColorStop(1,'rgba(0,0,0,.75)');
    hx.fillStyle=g;hx.fillRect(0,H-230,W,230);
    const pop=bt<10?ease(bt/10)*1.18:lerp(1.18,1,Math.min(1,(bt-10)/8));
    txt('¡'+game.winner.name+' GANA!',W/2,H-134,58*pop,'#ffd75a');
    if(bt>16&&game.winner.c.quote)txt(game.winner.c.quote,W/2,H-94,19,game.winner.hud);
    let cont='PUÑO (P) — MENÚ';
    if(game.tour&&game.winner===p1)cont='PUÑO (P) — SIGUIENTE RONDA';
    if(game.king){
      if(game.winner===p1){
        const left=game.king.queue.length-game.king.idx-1;
        txt('REY DE MESA · RACHA '+(game.king.streak+1),W/2,H-72,16,'#ffd75a');
        cont=left>0?('PUÑO (P) — SIGUIENTE RETADOR ('+left+' restantes)'):'PUÑO (P) — COMBATE FINAL GANADO';
      }else{txt('DESTRONADO · RACHA FINAL '+game.king.streak,W/2,H-72,16,'#ff8c6a');cont='PUÑO (P) — MENÚ';}
    }
    if(bt>30)txt(cont,W/2,H-48,17,Math.floor(performance.now()/380)%2?'#fff':'#9a8cc0');
  }
}
function drawCrawl(lines,cx,y,w,h,size){
  hx.save();hx.beginPath();hx.rect(cx-w/2,y,w,h);hx.clip();
  const t=performance.now()*.001;
  const step=size*1.62, total=lines.length*step+h*.75;
  lines.forEach((l,i)=>{
    let ly=y+h+i*step-(t*26)%total;
    if(ly<y-size)ly+=total;if(ly>y+h+total-size)ly-=total;
    if(ly>y-size&&ly<y+h+size){
      const u=Math.max(0,Math.min(1,(ly-y)/h));
      const sc=.72+u*.42, al=Math.min(1,u*2.4)*Math.min(1,(1.05-u)*6);
      hx.save();hx.translate(cx,ly);hx.scale(sc,sc);hx.globalAlpha=Math.max(0,al);
      txt(l,0,0,size,'#ffd75a',undefined,false);
      hx.restore();hx.globalAlpha=1;
    }
  });
  hx.restore();
}

  hx.fillStyle=g;hx.fillRect(0,0,W,H);
  const tp=performance.now();
  txt('PUÑO CALLEJERO 3D',W/2,110,52,'hsl('+(45+Math.sin(tp*.0018)*7)+',100%,'+(62+Math.sin(tp*.0027)*7)+'%)');
  txt('T O R N E O   M U N D I A L',W/2,142,17,'#ff8c1a');
  for(let i=0;i<game.menu.length;i++){
    const s=game.sel===i;

    W/2,188+game.menu.length*27+36,11,'#9a8cc0');
}
function project(v){const p=v.clone().project(cam);return{x:(p.x*.5+.5)*W,y:(1-(p.y*.5+.5))*H};}
function drawSelect(){
  hx.fillStyle='rgba(5,4,12,.45)';hx.fillRect(0,0,W,H);

    const C=CHARS[ROSTER[i]], s=project(new THREE.Vector3(r.root.position.x,3.1,r.root.position.z));
    const sel=game.p1c===i, p2s=game.mode2P&&game.confirmed[0]&&game.p2c===i;
    const x=clamp(s.x,58,W-58);
    hx.fillStyle=sel?'rgba(255,215,90,.14)':'rgba(0,0,0,.35)';
    hx.fillRect(x-52,s.y-26,104,40);
    hx.strokeStyle=sel?'#ffd75a':p2s?'#59d7ff':'rgba(255,255,255,.2)';
    hx.lineWidth=sel||p2s?3:1.5;hx.strokeRect(x-52,s.y-26,104,40);
    txt(C.name,x,s.y-7,12,sel?'#fff':'#d8cff0');
    txt(C.tag,x,s.y+8,7.5,'#9a8cc0');
    if(sel)txt('J1',x,s.y+30,15,'#ffd75a');
    if(p2s)txt('J2',x,s.y+46,15,'#59d7ff');
  });
  const B=CHARS[ROSTER[game.p1c]];
  hx.fillStyle='rgba(5,4,12,.78)';hx.fillRect(128,346,704,112);
  hx.strokeStyle='rgba(255,215,90,.4)';hx.lineWidth=2;hx.strokeRect(128,346,704,112);
  txt(B.name+' — '+B.tag,W/2,364,13,B.pal.hud);
  const sts=[['FUE',B.dmgMul/1.25],['VEL',B.speed/5],['RES',B.hpMax/125]];
  sts.forEach((v,k)=>{const bx=W/2-140+k*105;
    txt(v[0],bx-6,381,10,'#a89ac8','right',false);
    hx.fillStyle='rgba(0,0,0,.55)';hx.fillRect(bx,373,66,7);
    hx.fillStyle=B.pal.hud;hx.fillRect(bx,373,66*Math.min(1,v[1]),7);});
  drawCrawl(B.story,W/2,389,690,66,15);
  txt(game.mode2P?(game.confirmed[0]?'J2: , y . eligen · J1 pulsa J para empezar':'J1: A/D elegir · J confirmar')
    :'A/D elegir · J confirmar',W/2,478,15,'#c9bde8');
  txt('P puño · K patada · E especial · S super · doble toque = dash · atrás = bloqueo',W/2,504,12,'#8878a8');
}
function drawBracket(){
  hx.fillStyle='rgba(5,4,12,.86)';hx.fillRect(0,0,W,H);

  hx.beginPath();hx.moveTo(275,306);hx.lineTo(320,306);hx.lineTo(320,260);hx.lineTo(360,260);hx.stroke();

  txt('PUÑO (P) PARA LUCHAR',W/2,470,16,Math.floor(performance.now()/380)%2?'#fff':'#8878a8');
}
